<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="מערכת ניהול מלאי מזווה - משפחת רביבו">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>מזווה רביבו</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/svg+xml" href="./iconPWA.svg">
    <link rel="apple-touch-icon" href="./iconPWA.svg">
    
    <style>
        :root {
            --primary: #00b894;
            --primary-light: #55efc4;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --danger: #ff7675;
            --warning: #fdcb6e;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
            --radius-lg: 24px;
            --radius-md: 16px;
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none; /* Disable text selection for app feel */
            -webkit-user-select: none;
            -webkit-touch-callout: none; /* Disable long-press context menu */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.4;
            padding-bottom: calc(100px + var(--safe-bottom));
            overflow-x: hidden;
            direction: rtl;
            -webkit-font-smoothing: antialiased;
        }

        /* Premium Header */
        header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 20px 24px 15px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #00b894, #00cec9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #dfe6e9;
            transition: background 0.3s;
        }
        .sync-dot.online { background: var(--primary); box-shadow: 0 0 8px var(--primary); }
        .sync-dot.offline { background: var(--danger); }

        /* Category Chips */
        .categories-scroll {
            display: flex;
            gap: 10px;
            padding: 15px 24px;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .categories-scroll::-webkit-scrollbar { display: none; }

        .chip {
            background: var(--card-bg);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            box-shadow: var(--shadow-sm);
            white-space: nowrap;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }
        .chip.active {
            background: var(--primary);
            color: white;
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(0, 184, 148, 0.3);
        }

        /* Search Bar */
        .search-area {
            padding: 0 24px 15px;
        }
        .search-box {
            background: rgba(0,0,0,0.04);
            border-radius: 14px;
            display: flex;
            align-items: center;
            padding: 12px 16px;
            transition: background 0.2s;
        }
        .search-box:focus-within { background: rgba(0,0,0,0.06); }
        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 16px;
            outline: none;
            color: var(--text-main);
            padding: 0 8px;
            user-select: text; /* Allow typing */
            -webkit-user-select: text;
        }

        /* Items Grid */
        .items-container {
            padding: 0 24px;
            display: grid;
            gap: 16px;
        }

        .item-card {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            padding: 18px;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.4s ease-out backwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .item-card::before {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: transparent;
            transition: background 0.3s;
        }
        .item-card.out-of-stock::before { background: var(--danger); }
        .item-card.out-of-stock { opacity: 0.7; }

        .item-main { flex: 1; }
        .item-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .item-sub { font-size: 12px; color: var(--text-muted); font-weight: 500; }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #f8f9fa;
            padding: 6px;
            border-radius: 14px;
            direction: ltr;
        }

        .btn-qty {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            border: none;
            background: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        .btn-qty:active { transform: scale(0.9); background: #f1f2f6; }
        .btn-qty.plus { color: var(--primary); }
        .btn-qty.minus { color: var(--danger); }

        .qty-val {
            min-width: 28px;
            text-align: center;
            font-weight: 800;
            font-size: 20px;
            font-variant-numeric: tabular-nums;
        }

        /* Bottom Navigation */
        .nav-bar {
            position: fixed;
            bottom: 20px;
            left: 24px;
            right: 24px;
            background: rgba(45, 52, 54, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            height: 68px;
            border-radius: 34px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 1000;
            padding: 0 10px;
        }

        .nav-btn {
            color: rgba(255,255,255,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            font-weight: 700;
            text-decoration: none;
            transition: color 0.3s;
        }
        .nav-btn.active { color: var(--primary-light); }
        .nav-btn i { font-size: 22px; margin-bottom: 2px; }

        .fab-center {
            width: 54px;
            height: 54px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            box-shadow: 0 6px 20px rgba(0, 184, 148, 0.4);
            transform: translateY(-20px);
            transition: transform 0.2s;
        }
        .fab-center:active { transform: translateY(-15px) scale(0.9); }

        /* Drawer (Bottom Sheet) */
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .drawer-overlay.active { opacity: 1; visibility: visible; }

        .drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 32px 32px 0 0;
            padding: 24px 24px calc(30px + var(--safe-bottom));
            z-index: 2001;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
        }
        .drawer.active { transform: translateY(0); }

        .drawer-handle {
            width: 40px;
            height: 5px;
            background: #dfe6e9;
            border-radius: 10px;
            margin: -10px auto 20px;
        }

        .form-row { margin-bottom: 20px; }
        .form-row label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 8px; color: var(--text-muted); }
        .form-row input, .form-row select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid #f1f2f6;
            background: #f8f9fa;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            transition: border 0.2s;
            user-select: text;
            -webkit-user-select: text;
        }
        .form-row input:focus { border-color: var(--primary); background: white; }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 800;
            box-shadow: 0 6px 20px rgba(0, 184, 148, 0.2);
        }
        .btn-submit:active { transform: scale(0.98); }

        /* Toast Notification */
        .toast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(45, 52, 54, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            z-index: 3000;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: var(--shadow-md);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 40px;
            color: var(--text-muted);
        }
        .empty-state .icon { font-size: 64px; margin-bottom: 16px; display: block; }
        .empty-state p { font-weight: 600; font-size: 18px; }

        /* Haptic Feedback Simulation */
        .haptic-active { transform: scale(0.95); transition: transform 0.1s; }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <div>
                <h1>מזווה רביבו</h1>
                <div style="display: flex; align-items: center; gap: 6px; margin-top: 2px;">
                    <div id="syncDot" class="sync-dot"></div>
                    <span id="syncText" style="font-size: 11px; font-weight: 700; color: var(--text-muted);">מתחבר...</span>
                </div>
            </div>
            <div style="background: white; padding: 8px 14px; border-radius: 12px; box-shadow: var(--shadow-sm); font-weight: 800; font-size: 14px;">
                <span id="totalCount">0</span> פריטים
            </div>
        </div>
    </header>

    <div class="categories-scroll" id="categoryChips">
        <div class="chip active" data-cat="all">הכל</div>
        <div class="chip" data-cat="יבשים">יבשים</div>
        <div class="chip" data-cat="חטיפים">חטיפים</div>
        <div class="chip" data-cat="שתייה">שתייה</div>
        <div class="chip" data-cat="ניקיון וחד-פעמי">ניקיון</div>
        <div class="chip" data-cat="בישול">בישול</div>
        <div class="chip" data-cat="כללי">אחר</div>
    </div>

    <div class="search-area">
        <div class="search-box">
            <span style="font-size: 18px;">🔍</span>
            <input type="text" id="searchInput" placeholder="חיפוש מהיר במזווה...">
        </div>
    </div>

    <div id="itemsGrid" class="items-container">
        <!-- Items injected here -->
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-btn active" id="btnHome">
            <i>🏠</i>
            <span>בית</span>
        </a>
        <div class="fab-center" id="btnAdd">＋</div>
        <a href="#" class="nav-btn" id="btnOut">
            <i>⚠️</i>
            <span>חסר</span>
        </a>
    </nav>

    <!-- Drawer -->
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <div class="drawer" id="itemDrawer">
        <div class="drawer-handle"></div>
        <h2 id="drawerTitle" style="font-size: 22px; font-weight: 800; margin-bottom: 20px;">הוספת מוצר חדש</h2>
        <form id="itemForm">
            <div class="form-row">
                <label>שם המוצר</label>
                <input type="text" id="itemName" required placeholder="למשל: שמן זית">
            </div>
            <div style="display: flex; gap: 12px;">
                <div class="form-row" style="flex: 1;">
                    <label>כמות</label>
                    <input type="number" id="itemQty" value="1" min="0" required>
                </div>
                <div class="form-row" style="flex: 1;">
                    <label>קטגוריה</label>
                    <select id="itemCat">
                        <option value="כללי">כללי</option>
                        <option value="יבשים">יבשים</option>
                        <option value="חטיפים">חטיפים</option>
                        <option value="שתייה">שתייה</option>
                        <option value="ניקיון וחד-פעמי">ניקיון</option>
                        <option value="בישול">בישול</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn-submit">שמור במזווה</button>
            <button type="button" id="btnDelete" style="width: 100%; padding: 12px; background: none; border: none; color: var(--danger); font-weight: 700; margin-top: 10px; display: none;">מחק מוצר</button>
        </form>
    </div>

    <div id="toast" class="toast">הפעולה בוצעה בהצלחה</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, remove, update, push } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCpGMEYYcC2DyWgxM7q0jOi3a8Pby1knjM",
            authDomain: "yfwdf-3ba6f.firebaseapp.com",
            databaseURL: "https://yfwdf-3ba6f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yfwdf-3ba6f",
            storageBucket: "yfwdf-3ba6f.firebasestorage.app",
            messagingSenderId: "702528184926",
            appId: "1:702528184926:web:ead1114772b7741e8c0acf"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let items = {};
        let currentCat = 'all';
        let editingId = null;
        let showOnlyOut = false;

        const grid = document.getElementById('itemsGrid');
        const drawer = document.getElementById('itemDrawer');
        const overlay = document.getElementById('drawerOverlay');
        const form = document.getElementById('itemForm');
        const syncDot = document.getElementById('syncDot');
        const syncText = document.getElementById('syncText');

        // Real-time sync
        onValue(ref(db, 'items'), (snap) => {
            items = snap.val() || {};
            syncDot.className = 'sync-dot online';
            syncText.innerText = 'מחובר בזמן אמת';
            render();
        }, (err) => {
            syncDot.className = 'sync-dot offline';
            syncText.innerText = 'שגיאת חיבור';
        });

        function render() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = '';
            
            let keys = Object.keys(items).sort((a, b) => items[b].quantity - items[a].quantity);
            
            const filtered = keys.filter(id => {
                const item = items[id];
                const matchesSearch = item.name.toLowerCase().includes(search);
                const matchesCat = currentCat === 'all' || item.category === currentCat;
                const matchesOut = !showOnlyOut || item.quantity === 0;
                return matchesSearch && matchesCat && matchesOut;
            });

            document.getElementById('totalCount').innerText = Object.keys(items).length;

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="empty-state"><span class="icon">📦</span><p>המזווה ריק או שלא נמצאו תוצאות</p></div>`;
                return;
            }

            filtered.forEach((id, index) => {
                const item = items[id];
                const card = document.createElement('div');
                card.className = `item-card ${item.quantity === 0 ? 'out-of-stock' : ''}`;
                card.style.animationDelay = `${index * 0.05}s`;
                card.innerHTML = `
                    <div class="item-main" onclick="window.editItem('${id}')">
                        <div class="item-name">${item.name}</div>
                        <div class="item-sub">${item.category} • ${item.quantity === 0 ? 'אזל מהמלאי' : 'במלאי'}</div>
                    </div>
                    <div class="qty-controls">
                        <button class="btn-qty minus" onclick="window.changeQty('${id}', -1)">−</button>
                        <div class="qty-val">${item.quantity}</div>
                        <button class="btn-qty plus" onclick="window.changeQty('${id}', 1)">＋</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Global actions
        window.changeQty = (id, delta) => {
            const newQty = Math.max(0, (items[id].quantity || 0) + delta);
            update(ref(db, `items/${id}`), { quantity: newQty });
            showToast(`${items[id].name}: ${newQty}`);
        };

        window.editItem = (id) => {
            editingId = id;
            const item = items[id];
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemQty').value = item.quantity;
            document.getElementById('itemCat').value = item.category;
            document.getElementById('drawerTitle').innerText = 'עריכת מוצר';
            document.getElementById('btnDelete').style.display = 'block';
            openDrawer();
        };

        // UI Events
        document.getElementById('btnAdd').onclick = () => {
            editingId = null;
            form.reset();
            document.getElementById('itemQty').value = 1;
            document.getElementById('drawerTitle').innerText = 'הוספת מוצר חדש';
            document.getElementById('btnDelete').style.display = 'none';
            openDrawer();
        };

        function openDrawer() {
            overlay.classList.add('active');
            drawer.classList.add('active');
        }

        function closeDrawer() {
            overlay.classList.remove('active');
            drawer.classList.remove('active');
        }

        overlay.onclick = closeDrawer;

        form.onsubmit = (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('itemName').value,
                quantity: parseInt(document.getElementById('itemQty').value),
                category: document.getElementById('itemCat').value,
                minQuantity: 0,
                unit: "יח'"
            };
            const target = editingId ? ref(db, `items/${editingId}`) : push(ref(db, 'items'));
            set(target, data).then(() => {
                closeDrawer();
                showToast('נשמר בהצלחה ✨');
            });
        };

        document.getElementById('btnDelete').onclick = () => {
            if (confirm('למחוק את המוצר מהמזווה?')) {
                remove(ref(db, `items/${editingId}`)).then(() => {
                    closeDrawer();
                    showToast('המוצר הוסר');
                });
            }
        };

        // Search & Filter
        document.getElementById('searchInput').oninput = render;

        document.querySelectorAll('.chip').forEach(chip => {
            chip.onclick = () => {
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentCat = chip.dataset.cat;
                render();
            };
        });

        document.getElementById('btnHome').onclick = (e) => {
            e.preventDefault();
            showOnlyOut = false;
            document.getElementById('btnOut').classList.remove('active');
            document.getElementById('btnHome').classList.add('active');
            render();
        };

        document.getElementById('btnOut').onclick = (e) => {
            e.preventDefault();
            showOnlyOut = true;
            document.getElementById('btnHome').classList.remove('active');
            document.getElementById('btnOut').classList.add('active');
            render();
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        // Prevent double-tap zoom
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });

    </script>
</body>
</html>
