<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>מזווה רביבו • Premium</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/svg+xml" href="./iconPWA.svg">
    <link rel="apple-touch-icon" href="./iconPWA.svg">
    
    <style>
        :root {
            --accent: #00d2ff;
            --accent-gradient: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            --bg-gradient: linear-gradient(180deg, #f8faff 0%, #eef2f7 100%);
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-dark: #1e272e;
            --text-light: #808e9b;
            --danger: #ff5e57;
            --success: #05c46b;
            --warning: #ffa801;
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.05);
            --shadow-deep: 0 20px 50px rgba(0, 0, 0, 0.1);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-dark);
            min-height: 100vh;
            padding-top: calc(20px + var(--safe-top));
            padding-bottom: calc(100px + var(--safe-bottom));
            direction: rtl;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Animated Background Elements */
        .bg-blob {
            position: fixed;
            width: 300px;
            height: 300px;
            background: var(--accent-gradient);
            filter: blur(80px);
            opacity: 0.15;
            border-radius: 50%;
            z-index: -1;
            animation: float 20s infinite alternate;
        }
        .blob-1 { top: -100px; left: -100px; }
        .blob-2 { bottom: -100px; right: -100px; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.2); }
        }

        /* Premium Header */
        header {
            padding: 0 24px 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .brand h1 {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -1px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .brand p {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-pill {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-soft);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 800;
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
        .dot.online { background: var(--success); box-shadow: 0 0 10px var(--success); }

        /* Category Dock */
        .category-dock {
            display: flex;
            gap: 12px;
            padding: 10px 24px 25px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .category-dock::-webkit-scrollbar { display: none; }

        .cat-item {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            min-width: 90px;
            padding: 12px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-soft);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .cat-item.active {
            background: var(--accent-gradient);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
            border-color: transparent;
        }
        .cat-item.active .cat-icon, .cat-item.active .cat-label { color: white; }
        .cat-icon { font-size: 24px; }
        .cat-label { font-size: 11px; font-weight: 800; color: var(--text-light); }

        /* Search Bar */
        .search-container { padding: 0 24px 25px; }
        .search-bar {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-soft);
        }
        .search-bar input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
            user-select: text;
            -webkit-user-select: text;
        }

        /* Items Grid */
        .items-grid {
            padding: 0 24px;
            display: grid;
            gap: 20px;
        }

        .item-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-soft);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
            position: relative;
            overflow: hidden;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .item-card.out { opacity: 0.6; filter: grayscale(0.5); }
        .item-card.out::after {
            content: 'אזל';
            position: absolute;
            top: 10px;
            left: -30px;
            background: var(--danger);
            color: white;
            padding: 2px 40px;
            font-size: 10px;
            font-weight: 900;
            transform: rotate(-45deg);
        }

        .item-info { flex: 1; }
        .item-name { font-size: 19px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.5px; }
        .item-meta { font-size: 12px; font-weight: 700; color: var(--text-light); display: flex; gap: 8px; }
        .tag { background: rgba(0,0,0,0.05); padding: 2px 8px; border-radius: 6px; }

        .qty-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0,0,0,0.03);
            padding: 8px;
            border-radius: 20px;
            direction: ltr;
        }

        .btn-action {
            width: 42px;
            height: 42px;
            border-radius: 16px;
            border: none;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .btn-action:active { transform: scale(0.85); box-shadow: inset 0 2px 5px rgba(0,0,0,0.1); }
        .btn-action.plus { color: var(--accent); }
        .btn-action.minus { color: var(--danger); }

        .qty-num {
            font-size: 24px;
            font-weight: 900;
            min-width: 35px;
            text-align: center;
            font-variant-numeric: tabular-nums;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Floating Action Bar */
        .floating-nav {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 39, 46, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 30px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 40px;
            box-shadow: var(--shadow-deep);
            z-index: 1000;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .nav-icon { font-size: 24px; color: rgba(255,255,255,0.4); transition: all 0.3s; }
        .nav-icon.active { color: var(--accent); transform: scale(1.2); }

        .add-btn {
            width: 60px;
            height: 60px;
            background: var(--accent-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            box-shadow: 0 10px 25px rgba(0, 210, 255, 0.4);
            margin-top: -40px;
            border: 5px solid #1e272e;
            transition: transform 0.2s;
        }
        .add-btn:active { transform: scale(0.9) rotate(90deg); }

        /* Modern Drawer */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: 0.4s;
        }
        .overlay.active { opacity: 1; visibility: visible; }

        .drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 40px 40px 0 0;
            padding: 30px 24px calc(40px + var(--safe-bottom));
            z-index: 2001;
            transform: translateY(100%);
            transition: 0.5s cubic-bezier(0.32, 0.72, 0, 1);
        }
        .drawer.active { transform: translateY(0); }

        .handle { width: 50px; height: 6px; background: #eee; border-radius: 10px; margin: -10px auto 25px; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 14px; font-weight: 800; color: var(--text-light); margin-bottom: 8px; }
        .input-group input, .input-group select {
            width: 100%;
            padding: 16px 20px;
            border-radius: 18px;
            border: 2px solid #f0f2f5;
            background: #f8f9fa;
            font-size: 16px;
            font-weight: 700;
            outline: none;
            transition: 0.3s;
            user-select: text;
            -webkit-user-select: text;
        }
        .input-group input:focus { border-color: var(--accent); background: white; }

        .save-btn {
            width: 100%;
            padding: 18px;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 900;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: calc(20px + var(--safe-top));
            left: 24px;
            right: 24px;
            background: rgba(30, 39, 46, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white;
            padding: 16px 24px;
            border-radius: 20px;
            font-weight: 700;
            z-index: 3000;
            transform: translateY(-150%);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow-deep);
        }
        .toast.show { transform: translateY(0); }

        /* Empty State */
        .empty { text-align: center; padding: 80px 40px; }
        .empty-icon { font-size: 80px; margin-bottom: 20px; display: block; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1)); }
        .empty-text { font-size: 20px; font-weight: 800; color: var(--text-light); }
    </style>
</head>
<body>

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <header>
        <div class="brand">
            <p>משפחת רביבו</p>
            <h1>המזווה שלי</h1>
        </div>
        <div class="status-pill">
            <div id="syncDot" class="dot"></div>
            <span id="syncText">מתחבר...</span>
        </div>
    </header>

    <div class="category-dock" id="catDock">
        <div class="cat-item active" data-cat="all">
            <span class="cat-icon">🏠</span>
            <span class="cat-label">הכל</span>
        </div>
        <div class="cat-item" data-cat="יבשים">
            <span class="cat-icon">🌾</span>
            <span class="cat-label">יבשים</span>
        </div>
        <div class="cat-item" data-cat="חטיפים">
            <span class="cat-icon">🍪</span>
            <span class="cat-label">חטיפים</span>
        </div>
        <div class="cat-item" data-cat="שתייה">
            <span class="cat-icon">🥤</span>
            <span class="cat-label">שתייה</span>
        </div>
        <div class="cat-item" data-cat="ניקיון וחד-פעמי">
            <span class="cat-icon">🧼</span>
            <span class="cat-label">ניקיון</span>
        </div>
        <div class="cat-item" data-cat="בישול">
            <span class="cat-icon">🍳</span>
            <span class="cat-label">בישול</span>
        </div>
    </div>

    <div class="search-container">
        <div class="search-bar">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="מה חסר לנו היום?">
        </div>
    </div>

    <div id="itemsGrid" class="items-grid">
        <!-- Items injected here -->
    </div>

    <div class="floating-nav">
        <div class="nav-icon active" id="navHome">🏠</div>
        <div class="add-btn" id="btnAdd">＋</div>
        <div class="nav-icon" id="navOut">⚠️</div>
    </div>

    <!-- Drawer -->
    <div class="overlay" id="overlay"></div>
    <div class="drawer" id="drawer">
        <div class="handle"></div>
        <h2 id="drawerTitle" style="font-size: 26px; font-weight: 900; margin-bottom: 25px; letter-spacing: -1px;">הוספת מוצר</h2>
        <form id="itemForm">
            <div class="input-group">
                <label>שם המוצר</label>
                <input type="text" id="itemName" required placeholder="למשל: שמן זית כתית">
            </div>
            <div style="display: flex; gap: 15px;">
                <div class="input-group" style="flex: 1;">
                    <label>כמות</label>
                    <input type="number" id="itemQty" value="1" min="0" required>
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>קטגוריה</label>
                    <select id="itemCat">
                        <option value="כללי">כללי</option>
                        <option value="יבשים">יבשים</option>
                        <option value="חטיפים">חטיפים</option>
                        <option value="שתייה">שתייה</option>
                        <option value="ניקיון וחד-פעמי">ניקיון</option>
                        <option value="בישול">בישול</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="save-btn">שמור במזווה ✨</button>
            <button type="button" id="btnDelete" style="width: 100%; padding: 15px; background: none; border: none; color: var(--danger); font-weight: 800; margin-top: 15px; display: none;">מחק מוצר לצמיתות</button>
        </form>
    </div>

    <div id="toast" class="toast">
        <span>✨</span>
        <span id="toastMsg">הפעולה בוצעה בהצלחה</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, remove, update, push } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCpGMEYYcC2DyWgxM7q0jOi3a8Pby1knjM",
            authDomain: "yfwdf-3ba6f.firebaseapp.com",
            databaseURL: "https://yfwdf-3ba6f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yfwdf-3ba6f",
            storageBucket: "yfwdf-3ba6f.firebasestorage.app",
            messagingSenderId: "702528184926",
            appId: "1:702528184926:web:ead1114772b7741e8c0acf"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let items = {};
        let currentCat = 'all';
        let editingId = null;
        let showOnlyOut = false;

        const grid = document.getElementById('itemsGrid');
        const drawer = document.getElementById('drawer');
        const overlay = document.getElementById('overlay');
        const form = document.getElementById('itemForm');
        const syncDot = document.getElementById('syncDot');
        const syncText = document.getElementById('syncText');

        // Real-time listener
        onValue(ref(db, 'items'), (snap) => {
            items = snap.val() || {};
            syncDot.className = 'dot online';
            syncText.innerText = 'מחובר';
            render();
        }, (err) => {
            syncDot.className = 'dot';
            syncText.innerText = 'מנותק';
        });

        function render() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = '';
            
            let keys = Object.keys(items).sort((a, b) => items[b].quantity - items[a].quantity);
            
            const filtered = keys.filter(id => {
                const item = items[id];
                const matchesSearch = item.name.toLowerCase().includes(search);
                const matchesCat = currentCat === 'all' || item.category === currentCat;
                const matchesOut = !showOnlyOut || item.quantity === 0;
                return matchesSearch && matchesCat && matchesOut;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="empty"><span class="empty-icon">✨</span><p class="empty-text">המזווה נקי ומסודר</p></div>`;
                return;
            }

            filtered.forEach((id, index) => {
                const item = items[id];
                const card = document.createElement('div');
                card.className = `item-card ${item.quantity === 0 ? 'out' : ''}`;
                card.style.animationDelay = `${index * 0.05}s`;
                card.innerHTML = `
                    <div class="item-info" onclick="window.editItem('${id}')">
                        <div class="item-name">${item.name}</div>
                        <div class="item-meta">
                            <span class="tag">${item.category}</span>
                            <span>${item.quantity > 0 ? 'במלאי' : 'חסר'}</span>
                        </div>
                    </div>
                    <div class="qty-wrapper">
                        <button class="btn-action minus" onclick="window.changeQty('${id}', -1)">−</button>
                        <div class="qty-num">${item.quantity}</div>
                        <button class="btn-action plus" onclick="window.changeQty('${id}', 1)">＋</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.changeQty = (id, delta) => {
            const newQty = Math.max(0, (items[id].quantity || 0) + delta);
            update(ref(db, `items/${id}`), { quantity: newQty });
            showToast(`${items[id].name}: ${newQty}`);
        };

        window.editItem = (id) => {
            editingId = id;
            const item = items[id];
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemQty').value = item.quantity;
            document.getElementById('itemCat').value = item.category;
            document.getElementById('drawerTitle').innerText = 'עריכת מוצר';
            document.getElementById('btnDelete').style.display = 'block';
            openDrawer();
        };

        document.getElementById('btnAdd').onclick = () => {
            editingId = null;
            form.reset();
            document.getElementById('itemQty').value = 1;
            document.getElementById('drawerTitle').innerText = 'הוספת מוצר';
            document.getElementById('btnDelete').style.display = 'none';
            openDrawer();
        };

        function openDrawer() {
            overlay.classList.add('active');
            drawer.classList.add('active');
        }

        function closeDrawer() {
            overlay.classList.remove('active');
            drawer.classList.remove('active');
        }

        overlay.onclick = closeDrawer;

        form.onsubmit = (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('itemName').value,
                quantity: parseInt(document.getElementById('itemQty').value),
                category: document.getElementById('itemCat').value,
                minQuantity: 0,
                unit: "יח'"
            };
            const target = editingId ? ref(db, `items/${editingId}`) : push(ref(db, 'items'));
            set(target, data).then(() => {
                closeDrawer();
                showToast('נשמר בהצלחה ✨');
            });
        };

        document.getElementById('btnDelete').onclick = () => {
            if (confirm('למחוק את המוצר מהמזווה?')) {
                remove(ref(db, `items/${editingId}`)).then(() => {
                    closeDrawer();
                    showToast('המוצר הוסר');
                });
            }
        };

        document.getElementById('searchInput').oninput = render;

        document.querySelectorAll('.cat-item').forEach(item => {
            item.onclick = () => {
                document.querySelectorAll('.cat-item').forEach(c => c.classList.remove('active'));
                item.classList.add('active');
                currentCat = item.dataset.cat;
                render();
            };
        });

        document.getElementById('navHome').onclick = () => {
            showOnlyOut = false;
            document.getElementById('navOut').classList.remove('active');
            document.getElementById('navHome').classList.add('active');
            render();
        };

        document.getElementById('navOut').onclick = () => {
            showOnlyOut = true;
            document.getElementById('navHome').classList.remove('active');
            document.getElementById('navOut').classList.add('active');
            render();
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // Prevent zoom on mobile
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });

    </script>
</body>
</html>
